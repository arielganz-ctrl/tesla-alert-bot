name: Tesla Inventory Watch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-tesla:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
  pip install requests playwright
  playwright install chromium

      - name: Check Tesla page
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tesla_check.py

      - name: Save latest state
        run: |
          git config user.name "tesla-watch-bot"
          git config user.email "tesla-watch-bot@users.noreply.github.com"
          git add seen_tesla.json
          git commit -m "Update Tesla inventory state" || echo "No changes to commit"
          git push
